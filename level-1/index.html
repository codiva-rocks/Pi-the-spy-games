<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Level 1 – Save Pi the Spy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-wrap">
  <div class="top-bar">
    <a href="../welcome/index.html" class="back-btn">← Map</a>
    <span class="level-badge">⛰️ Level 1 – Save Pi the Spy</span>
  </div>

  <div class="progress-row">
    <span class="progress-label" id="prog-label">0 / 5 revealed</span>
    <div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
    <span class="progress-label" id="score-label">Score: 0</span>
  </div>

  <p class="character-label">Who is hidden under the ice?</p>
  <div class="reveal-area" id="reveal-area">
    <canvas id="char-canvas" width="240" height="240" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
    <div class="ice-grid" id="ice-grid"></div>
  </div>

  <div id="game-area">
    <div class="q-img-area"><canvas id="q-canvas" width="600" height="600"></canvas></div>
    <div class="question-text" id="q-text">Loading...</div>
    <div class="options" id="options"></div>
    <div class="msg" id="msg"></div>
    <div class="explanation-box" id="explanation-box" style="display:none"></div>
    <div style="text-align:center">
      <button class="next-btn" id="next-btn" style="display:none;margin-top:0.75rem;" onclick="advanceQuestion()">Next Question →</button>
    </div>
  </div>

  <div id="end-screen" class="end-screen" style="display:none;">
    <canvas id="end-canvas" width="240" height="240" style="border-radius:12px;margin-bottom:1rem;"></canvas>
    <h2 id="end-title"></h2>
    <p id="end-sub"></p>
    <div class="end-btns">
      <button class="restart-btn" onclick="restart()">Play again</button>
      <a href="../level-2/index.html" class="next-btn">Level 2 →</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
